<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adoção_Doguinhos</title>
</head>
<body>
    <div class="container">

        <h3>Cadastro para Adoção</h3>
        <form action="" id="formulario">

            <label for="Nome">Nome completo:</label>
            <input type="text" id="nome" placeholder="Nome">
            <div id="erroNome" class="erro"></div><br>

            <label for="Email">Email:</label>
            <input type="email" id="email" placeholder="Email">
            <div id="erroEmail" class="erro"></div><br>

            <label for="Telefone">Telefone:</label>
            <input type="text" id="telefone" placeholder="Telefone">
            <div id="erroTelefone" class="erro"></div><br>

            <label for="Cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="CPF">
            <div id="erroCpf" class="erro"></div><br>

            <label for="Idade">Idade:</label>
            <input type="number" id="idade" placeholder="Idade">
            <div id="erroIdade" class="erro"></div><br>

            <label for="Cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Cidade">
            <div id="erroCidade" class="erro"></div><br>

            <label for="tipoMoradia">Tipo de Moradia:</label>
            <select id="tipoMoradia">
                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="ap">Apartamento</option>
            </select><br><br>

</body>
</html>
