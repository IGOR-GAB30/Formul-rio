<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adoção_de_Doguinhos</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <script src="script.js"></script>

    <div class="container">

        <h3>Cadastro para Adoção</h3>
        <form action="" id="formulario">

            <label for="Nome">Nome completo:</label>
            <input type="text" id="nome" required placeholder="Nome">
            <div id="erroNome" class="erro"></div><br>

            <label for="Email">Email:</label>
            <input type="email" id="email" required placeholder="Email">
            <div id="erroEmail" class="erro"></div><br>

            <label for="Telefone">Telefone:</label>
            <input type="text" id="telefone" required placeholder="Telefone">
            <div id="erroTelefone" class="erro"></div><br>

            <label for="Cpf">CPF:</label>
            <input type="text" id="cpf" required placeholder="CPF">
            <div id="erroCpf" class="erro"></div><br>

            <label for="Idade">Idade:</label>
            <input type="number" id="idade" required placeholder="Idade">
            <div id="erroIdade" class="erro"></div><br>

            <label for="Cidade">Cidade:</label>
            <input type="text" id="cidade" required placeholder="Cidade">
            <div id="erroCidade" class="erro"></div><br>

            <label for="tipoMoradia">Tipo de Moradia:</label>
            <select id="tipoMoradia">
                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="ap">Apartamento</option>
            </select>
            <br><br>

            <label for="permite">Permite animal (apartamento):</label>
               <select id="permite">
                <option value="">Selecione</option>
                <option value="casa">permite</option>
                <option value="ap">não permite</option>
            </select>
            <br><br>

            <label for="Quintal">Sua moradia tem quintal:</label>
            <select id="quintal">
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
            <br><br>

            <label for="seguro">Seu quintal é seguro?</label>
            <select id="seguro">
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
            <br><br>

            <label for="Antes">Já teve algum animal antes?:</label>
            <select id="antes">
                <option value="">Selecione</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
            <br><br>

            <label for="Horas">Quantas horas você consegue ficar com o seu pet?</label>
            <input type="time" id="horas" required placeholder="Horas">
            <div id="erroHoras" class="erro"></div><br>

            <label for="Financeiro">Condições financeiras:</label>
            <select id="financeiro">
                <option value="">Selecione</option>
                <option value="boa">Tenho uma boa renda</option>
                <option value="media">Tenho uma renda média</option>
                <option value="baixa">Tenho baixa renda</option>
            </select>
            <br><br>

            <label for="motivo">Motivo da adoção</label><br>
            <textarea id="motivo"></textarea>
            <br><br>

            <label for="Termo">Aceito o termo de responsabilidade:</label>
            <input type="checkbox" id="termo" required>
            <div id="erroTermo" class="erro"></div><br>

            <button type="submit">Enviar</button>

        </form>

        <div class="resultado" id="resultado"></div>

        <img src="" alt="">

    </div>

</body>

</html>
